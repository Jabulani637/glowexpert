<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Order - GlowExpert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./src/assets/logo/glowexpert_logo.svg" />
  <link rel="stylesheet" href="./src/styles/luxury.css" />
  <script type="module" src="./src/config.js"></script>
</head>
<body>
  <nav id="navbar">
    <a href="index.html" class="nav-logo">Glow<span>Expert</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" class="nav-close-mobile">Home</a></li>
      <li><a href="index.html#collections" class="nav-close-mobile">Collections</a></li>
      <li><a href="blog.html" class="nav-close-mobile">Blog</a></li>
    </ul>
    <div class="nav-actions">
      <button class="nav-hamburger" id="navHamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main style="padding: 120px 80px; max-width: 900px; margin: 0 auto;">
    <h1 class="section-title" style="font-family: var(--font-display); font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 16px;">My Order</h1>
    <p class="muted" style="line-height: 1.9; margin-bottom: 28px;">Find your order status using your order reference.</p>

    <form style="background: rgba(201,168,76,0.06); border: 1px solid rgba(201,168,76,0.18); border-radius: 18px; padding: 18px; display:grid; gap: 12px;" onsubmit="event.preventDefault();"> 
      <label style="font-weight:700; letter-spacing:0.1em; text-transform:uppercase; font-size:0.75rem;">Order Reference</label>
      <input type="text" required style="padding: 14px 16px; border-radius: 14px; border: 1px solid rgba(201,168,76,0.35); background: rgba(255,255,255,0.6); outline:none; font-family: var(--font-body);" />
      <button type="submit" class="btn-luxury" style="border:none; cursor:pointer;">View Order</button>
      <p id="orderMsg" class="muted" style="margin:0; line-height:1.7;"></p>
    </form>
  </main>

  <footer style="margin-top: 80px;">
    <div class="footer-bottom" style="padding: 28px 80px; justify-content:center;">
      <span class="footer-copy">© 2026 GlowExpert. All rights reserved.</span>
    </div>
  </footer>

  <script type="module" src="./src/pages/shared/navbar-scroll-init.js"></script>
  <script>
    const form = document.querySelector('form');
    const msg = document.getElementById('orderMsg');
    form?.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      if (!msg) return;
      msg.textContent = '';
      const input = form.querySelector('input');
      const reference = input?.value?.trim();
      if (!reference) {
        msg.textContent = 'Enter an order reference.';
        return;
      }
      try {
        const res = await fetch('/api/orders/lookup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reference })
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.message || 'Lookup failed');
        msg.textContent = `Status: ${json.data.status} — ${json.data.items.length} items — Total: ${json.data.total_amount}`;
      } catch (err) {
        msg.textContent = err.message || 'Lookup failed';
      }
    });
  </script>
</body>
</html>
